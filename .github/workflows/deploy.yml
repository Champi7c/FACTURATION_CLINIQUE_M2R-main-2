# ============================================
# CI/CD : Build, push Docker Hub, déploiement SSH
# ============================================
# Déclenché sur push sur la branche main.
#
# Secrets GitHub à configurer (Settings → Secrets and variables → Actions) :
#   DOCKERHUB_USERNAME : utilisateur Docker Hub
#   DOCKERHUB_TOKEN    : token d'accès Docker Hub (ou mot de passe)
#   SSH_PRIVATE_KEY   : clé privée SSH pour se connecter au serveur
#   SSH_HOST          : 72.62.29.141 (ou variable si plusieurs envs)
#   SSH_USER          : utilisateur SSH (ex: root ou deploy)
# ============================================

name: Build and Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: docker.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/facturation-clinique-frontend
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/facturation-clinique-backend
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            REACT_APP_API_BASE_URL=${{ vars.REACT_APP_API_BASE_URL || 'http://72.62.29.141:9001/api' }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            export PATH="$PATH:/usr/local/bin"
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            cd "${DEPLOY_PATH:-/opt/facturation-clinique}"
            echo "Pull des images..."
            docker compose pull
            echo "Redémarrage des services..."
            docker compose up -d
            echo "Nettoyage des images inutilisées..."
            docker image prune -f
            echo "Déploiement terminé."
