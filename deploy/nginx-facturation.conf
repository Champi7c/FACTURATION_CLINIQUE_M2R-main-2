# ============================================
# Nginx (sur l'hôte) - Reverse proxy vers les containers
# ============================================
# À placer dans /etc/nginx/sites-available/ puis :
#   sudo ln -s /etc/nginx/sites-available/nginx-facturation.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Adapter server_name et les ports si besoin (ex: 9000, 9001, 9002).
# ============================================

# Frontend React (container écoute sur 9000 -> 80)
upstream facturation_frontend {
    server 127.0.0.1:9000;
}

# Backend Django (container écoute sur 9001 -> 8000)
upstream facturation_backend {
    server 127.0.0.1:9001;
}

# phpMyAdmin (container écoute sur 9002 -> 80)
upstream facturation_phpmyadmin {
    server 127.0.0.1:9002;
}

# Frontend
server {
    listen 80;
    server_name 72.62.29.141;   # Remplacer par votre domaine ou IP

    location / {
        proxy_pass http://facturation_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Backend API (sous /api pour un même domaine, ou un sous-domaine)
server {
    listen 80;
    server_name api.72.62.29.141;   # Optionnel : sous-domaine API

    location / {
        proxy_pass http://facturation_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location /static/ {
        proxy_pass http://facturation_backend;
        proxy_set_header Host $host;
    }
}

# phpMyAdmin (accès restreint recommandé : IP ou auth_basic)
server {
    listen 80;
    server_name pma.72.62.29.141;   # Optionnel : sous-domaine phpMyAdmin

    location / {
        proxy_pass http://facturation_phpmyadmin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
}

